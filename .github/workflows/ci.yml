name: CI

# Build-validates SensorView on all three target OSes and uploads the produced
# installers (.exe/.msi, .deb/.AppImage, .dmg) as workflow artifacts.
# Publishing tagged releases is handled by release.yml.

on:
  push:
    branches: [master]
    paths: ["app/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["app/**", ".github/workflows/ci.yml"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundles: "msi,nsis" # .msi + NSIS .exe installer
          - platform: ubuntu-22.04
            bundles: "deb,appimage" # .deb + .AppImage
          - platform: macos-latest
            bundles: "dmg" # .dmg (arm64)
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential file wget

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build application + installers
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: sensorview-${{ matrix.platform }}
          path: |
            app/src-tauri/target/release/bundle/**/*.msi
            app/src-tauri/target/release/bundle/**/*-setup.exe
            app/src-tauri/target/release/bundle/**/*.deb
            app/src-tauri/target/release/bundle/**/*.AppImage
            app/src-tauri/target/release/bundle/**/*.dmg
          if-no-files-found: warn
