name: Release

# On a version tag (e.g. v0.1.0) build the native SensorView app on all three
# OSes and publish a GitHub Release with the installers attached:
#   Windows: NSIS setup .exe   Linux: .deb + .AppImage   macOS: .dmg

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            formats: nsis
          - platform: ubuntu-22.04
            formats: deb,appimage
          - platform: macos-latest
            formats: dmg
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app -> target

      - name: Run tests
        run: cargo test

      - name: Build (release)
        run: cargo build --release

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Package installers
        run: cargo packager --release --formats ${{ matrix.formats }} --verbose

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "SensorView ${{ github.ref_name }}"
          body: "Download the installer for your platform below (.exe, .deb/.AppImage, .dmg)."
          files: |
            app/target/release/*-setup.exe
            app/target/release/*.deb
            app/target/release/*.AppImage
            app/target/release/*.dmg
